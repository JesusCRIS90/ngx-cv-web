<section>
  <h1>Blog List</h1>
  <p>Welcome to the blog list page. Here you'll find a collection of blog posts.</p>
  @for (article of articles(); track $index) {
    <article>
      <h2>{{ article.title }}</h2>
      <p>{{ article.description }}</p>
      <a [routerLink]="['/blog', article.slug]">Read more</a>
    </article>
  }
</section>
