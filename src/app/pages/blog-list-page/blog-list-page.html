<section>
  <header 
    [style]="getHeroBlogImageUrl()"
  class="hero-blog">
    <div class="hero-content">
      <h1 class="title">My Blog Title</h1>
      <p class="slogan">Thoughts, stories, and ideas</p>
    </div>
  </header>
  <div class="article-list-container">
    <bee-vertical-layout [gap]="10">
      @for (article of articles(); track $index) {
      <article-card [articleCardData]="GetArticleCard(article)" />
      }
    </bee-vertical-layout>
  </div>
</section>
