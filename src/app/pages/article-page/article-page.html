@if ( article() ) {
<section>
  <header-article class="article-header"
    [articleLanguage]="language()"
    [articleHeader]="articleHeader"
  />

  <div class="article-container">
    <bee-vertical-layout>
        <button
          class="btn-language-change btn-article-style"
          (click)="onClickChangeLanguage()"
        >
          {{ currentLanguageLabel }}
        </button>
      <bee-markdown-viewer
        class="article"
        [markdownPath]="markdownPath()"
        (headingsChange)="onHeadingsChange($event)"
      />
    </bee-vertical-layout>
    <div class="md-navigator" [class.md-nav-activate]="isVerticalScreen()">
      <bee-markdown-navigator [headings]="headingsDocs()" [maxDepth]="3" />

      <button class="btn-article-style" (click)="backToArticlesList()">
        Back to Articles
      </button>
    </div>
  </div>

  <button
    class="btn-article-style"
    (click)="backToArticlesList()"
    [class.btn-vertical-activate]="!isVerticalScreen()"
  >
    Back to Articles
  </button>

  <!-- This code is exclusive to get the Orientation of the Screen -->
  <bee-responsive-layout
    [TriggerFactorVert2Hori]="getFactorVert2Hori()"
    (orientationChange)="triggerOrientation($event)"
  >
    <ng-template #screenVertical></ng-template>
    <ng-template #screenHorizontal></ng-template>
  </bee-responsive-layout>
  <!-- ----------------------------------------------------------- -->

</section>
} @else {
<section>
  <p>Loading article...</p>
</section>
}
