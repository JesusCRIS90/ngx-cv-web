@if ( article() ) {
<section>
  <header-article [articleHeader]="articleHeader" />

  <div class="article-container">
    <bee-markdown-viewer
      class="article"
      [markdownPath]="markdownPath('en')"
      (headingsChange)="onHeadingsChange($event)"
    />
    <div class="md-navigator">
      <bee-markdown-navigator
        [headings]="headingsDocs()"
        [maxDepth]="3"
      />

      <button (click)="backToArticlesList()">Back to Articles</button>
    </div>
  </div>

  <!-- <hr /> -->

  <!-- <pre>{{ article() | json }}</pre> -->
</section>
} @else {
<section>
  <p>Loading article...</p>
</section>
}
