@if ( article() ) {
<section>
  <header-article
    [articleLanguage]="language()"
    [articleHeader]="articleHeader"
  />

  <div class="article-container">
    <div class="md-viewer-container">
      <button (click)="onClickChangeLanguage()">
        {{ currentLanguageLabel }}
      </button>
      <bee-markdown-viewer
        class="article"
        [markdownPath]="markdownPath()"
        (headingsChange)="onHeadingsChange($event)"
      />
    </div>
    <div class="md-navigator">
      <bee-markdown-navigator [headings]="headingsDocs()" [maxDepth]="3" />

      <button (click)="backToArticlesList()">Back to Articles</button>
    </div>
  </div>

  <!-- <hr /> -->

  <!-- <pre>{{ article() | json }}</pre> -->
</section>
} @else {
<section>
  <p>Loading article...</p>
</section>
}
