@if ( article() ) {
<section>
  <h2>{{ article()?.['title'] ?? 'Untitled article' }}</h2>

  <p>Article Slug: {{ slug }}</p>

  <hr />

  <div class="article-container">
    <bee-markdown-viewer
      [markdownPath]="markdownPath('en')"
      (headingsChange)="onHeadingsChange($event)"
    />

    <bee-markdown-navigator [headings]="headingsDocs()" [maxDepth]="3" />
  </div>

  <hr />

  <h3>Raw Article Payload</h3>
  <pre>{{ article() | json }}</pre>
</section>
} @else {
<section>
  <p>Loading article...</p>
</section>
}
